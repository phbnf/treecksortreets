<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Treecks or Treets</title>
  <style>
    :root {
      --bg-dark: #121212;
      --panel-bg: #1e1e1e;
      --border-color: #333333;
      --text-main: #e0e0e0;
      --accent: #4fc1ff;
      --accent-hover: #3fa8dd;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .welcome-container {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      color: var(--accent);
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-link {
      display: block;
      background-color: #252526;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .menu-link:hover {
      background-color: #2d2d2d;
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .menu-link.highlight {
      background-color: var(--accent);
      color: #000;
      font-weight: bold;
      border-color: var(--accent);
    }

    .menu-link.highlight:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #000;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <h1>Hello, welcome to Treecks or Treets</h1>
    <nav>
      <ul class="menu">
        <li><a href="learn.html" class="menu-link">1. Learn</a></li>
        <li><a href="play.html" class="menu-link">2. Play</a></li>
        <li><a href="tree-generator.html" class="menu-link highlight">3. Tree Generator</a></li>
      </ul>
    </nav>
  </div>
</body>
</html>
